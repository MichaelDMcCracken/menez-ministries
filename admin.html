<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sermon Admin</title>
    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            margin: 0;
            background: #f8f9fb;
            color: #111;
        }
        .page {
            max-width: 760px;
            margin: 0 auto;
            padding: 32px;
        }
        h1 {
            margin-bottom: 12px;
        }
        .note {
            margin: 0 0 24px;
            color: #555;
            line-height: 1.6;
        }
        form {
            background: white;
            border: 1px solid #e1e4ea;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 16px 40px rgba(18, 32, 60, 0.08);
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }
        input, textarea, select {
            width: 100%;
            padding: 12px 14px;
            margin-bottom: 18px;
            border: 1px solid #c7cbd6;
            border-radius: 10px;
            font-size: 1rem;
            font-family: inherit;
            background: #fff;
            box-sizing: border-box;
        }
        textarea {
            min-height: 100px;
            resize: vertical;
        }
        button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 12px 22px;
            border: none;
            border-radius: 10px;
            background: #1d4ed8;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover {
            background: #1e40af;
        }
        .status {
            margin-top: 18px;
            padding: 16px;
            border-radius: 12px;
            font-weight: 600;
            display: none;
        }
        .status.success {
            background: #ecfdf5;
            color: #166534;
            border: 1px solid #a7f3d0;
        }
        .status.error {
            background: #fef2f2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }
    </style>
</head>
<body>
    <div class="page">
        <h1>Sermon Admin</h1>
        <p class="note">Use this page locally after running <code>npm run admin</code>. It updates <code>sermons-data.json</code> directly. After saving, run <code>npm run build</code> and commit/push the updated files.</p>

        <form id="admin-form">
            <label for="book">Book slug</label>
            <select id="book" name="book" required>
                <option value="" disabled selected>Select a book</option>
                <option value="__new__">Add a new book slug</option>
            </select>
            <input id="new-book" name="newBook" placeholder="New book slug (e.g. 1-corinthians)" style="display:none">

            <label for="subtitle">Book subtitle (optional)</label>
            <input id="subtitle" name="subtitle" placeholder="Optional subtitle for a new book">

            <label for="title">Sermon title</label>
            <input id="title" name="title" required>

            <label for="passage">Passage</label>
            <input id="passage" name="passage" placeholder="e.g. 1 Corinthians 2:1–5">

            <label for="date">Date</label>
            <input id="date" name="date" type="date" placeholder="YYYY-MM-DD">

            <label for="url">Audio URL</label>
            <input id="url" name="url" type="url" placeholder="https://..." required>

            <button type="submit">Save sermon</button>
            <button type="button" id="build-button" style="margin-left: 12px; background:#047857;">Build now</button>
        </form>

        <div id="status" class="status"></div>
    </div>

    <script>
        const form = document.getElementById('admin-form');
        const statusEl = document.getElementById('status');
        const bookSelect = document.getElementById('book');
        const newBookInput = document.getElementById('new-book');
        const buildButton = document.getElementById('build-button');

        function showStatus(message, type = 'success') {
            statusEl.textContent = message;
            statusEl.className = 'status ' + type;
            statusEl.style.display = 'block';
        }

        function hideStatus() {
            statusEl.style.display = 'none';
        }

        function updateBookInputVisibility() {
            const isNew = bookSelect.value === '__new__';
            newBookInput.style.display = isNew ? 'block' : 'none';
            if (!isNew) {
                newBookInput.value = '';
            }
        }

        async function loadBookSlugs() {
            try {
                const response = await fetch('/data');
                if (!response.ok) throw new Error('Unable to load sermon data');
                const data = await response.json();
                const slugs = Object.keys(data).sort();
                bookSelect.innerHTML = '<option value="" disabled selected>Select a book</option>' +
                    '<option value="__new__">Add a new book slug</option>' +
                    slugs.map(slug => `<option value="${slug}">${slug}</option>`).join('');
                updateBookInputVisibility();
            } catch (error) {
                showStatus(error.message, 'error');
            }
        }

        async function submitSermon() {
            const bookValue = bookSelect.value;
            const book = bookValue === '__new__' ? newBookInput.value.trim() : bookValue;
            const payload = {
                book,
                subtitle: document.getElementById('subtitle').value.trim(),
                title: document.getElementById('title').value.trim(),
                passage: document.getElementById('passage').value.trim(),
                date: document.getElementById('date').value,
                url: document.getElementById('url').value.trim()
            };

            if (!book || !payload.title || !payload.url) {
                showStatus('Book slug, sermon title, and URL are required.', 'error');
                return;
            }

            try {
                const response = await fetch('/add-sermon', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const result = await response.json();
                if (!response.ok) throw new Error(result.error || 'Failed to save sermon');
                showStatus('Sermon saved successfully. You can now build the site below.');
                form.reset();
                updateBookInputVisibility();
                loadBookSlugs();
            } catch (error) {
                showStatus(error.message, 'error');
            }
        }

        async function runBuild() {
            hideStatus();
            showStatus('Running build... please wait.', 'success');
            try {
                const response = await fetch('/build', { method: 'POST' });
                const result = await response.json();
                if (!response.ok) throw new Error(result.error || 'Build failed');
                showStatus('Build completed successfully. Check your local files and then push the repo.');
            } catch (error) {
                showStatus(error.message, 'error');
            }
        }

        form.addEventListener('submit', event => {
            event.preventDefault();
            hideStatus();
            submitSermon();
        });

        bookSelect.addEventListener('change', updateBookInputVisibility);
        buildButton.addEventListener('click', runBuild);

        loadBookSlugs();
    </script>
</body>
</html>
